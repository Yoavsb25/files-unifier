name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Company name'
        required: true
        type: string
      expires:
        description: 'License expiration date (YYYY-MM-DD)'
        required: true
        type: string
      machines:
        description: 'Number of allowed machines'
        required: false
        default: '1'
        type: string
  push:
    branches:
      - main
    paths:
      - 'build_config/windows.spec'
      - 'main.py'
      - 'pdf_merger/**'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Generate keys (if needed)
      run: |
        if not exist "tools\private_key.pem" (
          python tools\license_generator.py generate-keys --output-dir tools
          copy tools\public_key.pem pdf_merger\licensing\public_key.pem
        )
      continue-on-error: true
    
    - name: Generate license
      if: github.event_name == 'workflow_dispatch'
      run: |
        python tools\license_generator.py generate-license ^
          --company "${{ github.event.inputs.company }}" ^
          --expires "${{ github.event.inputs.expires }}" ^
          --machines ${{ github.event.inputs.machines }} ^
          --output deliveries\license.json
    
    - name: Build Windows executable
      run: |
        build_config\build.bat
    
    - name: Create delivery package
      if: github.event_name == 'workflow_dispatch'
      run: |
        mkdir deliveries\Windows_Package
        copy "dist\PDF Batch Merger.exe" deliveries\Windows_Package\
        copy deliveries\license.json deliveries\Windows_Package\
        copy docs\README_USER.md deliveries\Windows_Package\User_Guide.md
        echo PDF Batch Merger - Installation Instructions > deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo ================================================== >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo. >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo Company: ${{ github.event.inputs.company }} >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo Version: 1.0.0 >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo Platform: WINDOWS >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo. >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo INSTALLATION: >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo -------------------------------------------------- >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo. >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo 1. Copy 'PDF Batch Merger.exe' to your desired location >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo 2. Copy 'license.json' to the same folder as the .exe >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo    (or to %%USERPROFILE%%\.pdf_merger\ directory) >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
        echo 3. Double-click 'PDF Batch Merger.exe' to launch >> deliveries\Windows_Package\INSTALLATION_INSTRUCTIONS.txt
    
    - name: Create zip file
      if: github.event_name == 'workflow_dispatch'
      run: |
        powershell Compress-Archive -Path deliveries\Windows_Package\* -DestinationPath deliveries\PDF_Batch_Merger_Windows.zip -Force
    
    - name: Upload Windows executable
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: |
          dist/PDF Batch Merger.exe
          deliveries/PDF_Batch_Merger_Windows.zip
        retention-days: 30
